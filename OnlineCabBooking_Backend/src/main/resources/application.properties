# ==========================================
# Application
# ==========================================
spring.application.name=cab-booking-backend

# ==========================================
# Server Configuration
# ==========================================
#server.port=8080

# Context Path (optional)
# Access APIs as: http://localhost:8080/api/...
server.servlet.context-path=/api

# ==========================================
# Database Configuration
# ==========================================
spring.datasource.url=jdbc:mysql://localhost:3306/cab_booking_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Kolkata

spring.datasource.username=root
spring.datasource.password=manager
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ==========================================
# JPA / Hibernate
# ==========================================
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ==========================================
# Mail Configuration (Update Later)
# ==========================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your_email@gmail.com
spring.mail.password=your_app_password

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ==========================================
# JWT Configuration
# ==========================================
jwt.secret=ChangeThisToAVeryLongRandomSecretKeyForCabBookingProject123456789
jwt.expiration=86400000

# ==========================================
# Swagger / OpenAPI
# ==========================================
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html